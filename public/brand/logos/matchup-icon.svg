<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="MatchUp icon">
  <defs>
    <linearGradient id="paddleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25A55A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6EE3D"/>
      <stop offset="100%" stop-color="#C4CC14"/>
    </linearGradient>
  </defs>

  <!-- Swoosh arc -->
  <path d="M 10 80 Q 40 10 76 28" stroke="#E6EE3D" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Paddle body -->
  <rect x="8" y="24" width="52" height="62" rx="26" ry="26" fill="url(#paddleGrad)"/>

  <!-- Paddle handle -->
  <rect x="23" y="74" width="22" height="18" rx="5" fill="#15803D"/>
  <rect x="21" y="79" width="26" height="9" rx="3" fill="#0f6830"/>

  <!-- Paddle holes -->
  <circle cx="24" cy="38" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="44" cy="38" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="34" cy="48" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="22" cy="57" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="46" cy="57" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="34" cy="30" r="3.5" fill="white" opacity="0.9"/>

  <!-- Pickleball -->
  <circle cx="76" cy="22" r="16" fill="url(#ballGrad)"/>
  <circle cx="71" cy="17" r="2.5" fill="#0f6830" opacity="0.7"/>
  <circle cx="81" cy="17" r="2.5" fill="#0f6830" opacity="0.7"/>
  <circle cx="76" cy="26" r="2.5" fill="#0f6830" opacity="0.7"/>
  <circle cx="68" cy="26" r="2.5" fill="#0f6830" opacity="0.7"/>
  <circle cx="84" cy="26" r="2.5" fill="#0f6830" opacity="0.7"/>
  <circle cx="76" cy="13" r="2.5" fill="#0f6830" opacity="0.7"/>
</svg>
